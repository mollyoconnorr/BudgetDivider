<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Edit item</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/edit.css">
</head>
<body>
    <div class="page edit-page">
        <header class="page-header">
            <a class="back-link" href="/">← Back to canvas</a>
            <h1>Edit item</h1>
            <p class="subhead">Tweak the title, cost, participants, or mark it paid up.</p>
        </header>
        <div class="edit-card">
            <form method="post" action="/item/update">
                <input type="hidden" name="id" value="{{.Item.ID}}" />
                <label>
                    <span>Title</span>
                    <input required type="text" name="title" maxlength="30" value="{{.Item.Title}}" />
                </label>
                <label>
                    <span>Description</span>
                    <textarea rows="3" name="description" maxlength="200">{{.Item.Description}}</textarea>
                </label>
                <label>
                    <span>Cost</span>
                    <input required min="0.1" step="0.01" type="number" name="cost" value="{{.CostValue}}" />
                </label>
                <div class="participant-section">
                    <p class="muted-field">Participants</p>
                    <div class="participant-grid">
                        {{range .Users}}
                        <label class="participant-pill">
                            <input type="checkbox" name="participants" value="{{.ID}}" {{if index $.Selected .ID}}checked{{end}} />
                            {{.Name}}
                        </label>
                        {{else}}
                        <span class="muted">Add friends first.</span>
                        {{end}}
                    </div>
                </div>
                <label class="checkbox-field">
                    <input type="checkbox" name="paid_up" value="1" {{if .Item.Settled}}checked{{end}} />
                    Mark this item as paid up and clear payments.
                </label>
                <button type="submit" class="primary">Save changes</button>
            </form>
            <form method="post" action="/item/delete" class="delete-form">
                <input type="hidden" name="id" value="{{.Item.ID}}" />
                <button type="submit" class="danger">Delete item</button>
            </form>
        </div>
        {{if .Warning}}
        <div id="edit-warning" class="warning-overlay visible">
            <div class="warning-dialog">
                <p>{{.Warning}}</p>
                <button type="button" id="warning-ok">Okay</button>
            </div>
        </div>
        {{end}}
    </div>
    <script src="/static/js/item_edit.js" defer></script>
</body>
</html>
